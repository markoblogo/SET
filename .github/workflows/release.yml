name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Run full publish flow"
        default: "false"
        required: false

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build backend
        run: python -m pip install --upgrade build
      - name: Build distributions
        run: python -m build
      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
  publish:
    if: |
      github.event_name == 'push' ||
      github.event.inputs.publish == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Detect PyPI token availability
        id: detect_pypi_token
        shell: bash
        run: |
          if [ -n "${{ secrets.PYPI_API_TOKEN }}" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to PyPI (OIDC)
        id: publish_oidc
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true
      - name: Publish to PyPI (API token fallback)
        if: steps.publish_oidc.outcome == 'failure' && steps.detect_pypi_token.outputs.has_token == 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade twine
          twine upload --non-interactive dist/*
      - name: Ensure PyPI publish
        if: steps.publish_oidc.outcome == 'failure' && steps.detect_pypi_token.outputs.has_token == 'false'
        run: |
          echo "No trusted publisher and no PYPI_API_TOKEN provided." >&2
          exit 1
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
