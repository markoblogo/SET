name: 'SET'
description: 'Thin orchestration entrypoint for agentsgen init/pack/check flows.'

inputs:
  agentsgen:
    description: 'Enable the agentsgen tool family.'
    required: false
    default: 'true'
  init:
    description: 'Run agentsgen init.'
    required: false
    default: 'true'
  pack:
    description: 'Run agentsgen pack.'
    required: false
    default: 'false'
  site_pack:
    description: 'Run agentsgen pack in public-site mode.'
    required: false
    default: 'false'
  site_url:
    description: 'Public URL passed to agentsgen pack --site.'
    required: false
    default: ''
  check:
    description: 'Run agentsgen check --all --ci.'
    required: false
    default: 'false'
  analyze:
    description: 'Run agentsgen analyze against a public URL.'
    required: false
    default: 'false'
  analyze_url:
    description: 'Public URL passed to agentsgen analyze.'
    required: false
    default: ''
  meta:
    description: 'Run agentsgen meta against a public URL.'
    required: false
    default: 'false'
  meta_url:
    description: 'Public URL passed to agentsgen meta.'
    required: false
    default: ''
  autodetect:
    description: 'Enable agentsgen autodetect where supported.'
    required: false
    default: 'true'
  preset:
    description: 'Optional preset name passed to agentsgen init.'
    required: false
    default: ''
  path:
    description: 'Target path.'
    required: false
    default: '.'
  agentsgen_ref:
    description: 'Git ref used when installing agentsgen from GitHub.'
    required: false
    default: 'main'

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install agentsgen
      if: ${{ inputs.agentsgen == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        python -m pip install "git+https://github.com/markoblogo/AGENTS.md_generator.git@${{ inputs.agentsgen_ref }}"

    - name: Run agentsgen init
      if: ${{ inputs.agentsgen == 'true' && inputs.init == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        cmd=(agentsgen init "${{ inputs.path }}" --defaults)
        if [ "${{ inputs.autodetect }}" = "true" ]; then
          cmd+=(--autodetect)
        fi
        if [ -n "${{ inputs.preset }}" ]; then
          cmd+=(--preset "${{ inputs.preset }}")
        fi
        printf 'Running:'
        printf ' %q' "${cmd[@]}"
        printf '\n'
        "${cmd[@]}"

    - name: Run agentsgen pack
      if: ${{ inputs.agentsgen == 'true' && inputs.pack == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        cmd=(agentsgen pack "${{ inputs.path }}")
        if [ "${{ inputs.autodetect }}" = "true" ]; then
          cmd+=(--autodetect)
        fi
        if [ "${{ inputs.site_pack }}" = "true" ]; then
          if [ -z "${{ inputs.site_url }}" ]; then
            echo "ERROR: site_url is required when site_pack=true" >&2
            exit 1
          fi
          cmd+=(--site "${{ inputs.site_url }}")
        fi
        printf 'Running:'
        printf ' %q' "${cmd[@]}"
        printf '\n'
        "${cmd[@]}"

    - name: Run agentsgen check
      if: ${{ inputs.agentsgen == 'true' && inputs.check == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        agentsgen check "${{ inputs.path }}" --all --ci

    - name: Run agentsgen analyze
      if: ${{ inputs.agentsgen == 'true' && inputs.analyze == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        if [ -z "${{ inputs.analyze_url }}" ]; then
          echo "ERROR: analyze_url is required when analyze=true" >&2
          exit 1
        fi
        cmd=(agentsgen analyze "${{ inputs.analyze_url }}" "${{ inputs.path }}")
        printf 'Running:'
        printf ' %q' "${cmd[@]}"
        printf '\n'
        "${cmd[@]}"

    - name: Run agentsgen meta
      if: ${{ inputs.agentsgen == 'true' && inputs.meta == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        if [ -z "${{ inputs.meta_url }}" ]; then
          echo "ERROR: meta_url is required when meta=true" >&2
          exit 1
        fi
        cmd=(agentsgen meta "${{ inputs.meta_url }}" "${{ inputs.path }}")
        printf 'Running:'
        printf ' %q' "${cmd[@]}"
        printf '\n'
        "${cmd[@]}"
